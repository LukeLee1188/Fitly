// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        // Force the Kotlin version to 2.0.21
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // Add the Compose Compiler plugin to the classpath
        classpath("org.jetbrains.kotlin:compose-compiler-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

// Ensure all subprojects (like expo-dev-launcher) use the new compiler
subprojects {
    configurations.all {
        resolutionStrategy.eachDependency { DependencyResolveDetails details ->
            if (details.requested.group == 'org.jetbrains.kotlin' && 
                details.requested.name.contains('kotlin-compose-compiler-plugin-embeddable')) {
                // If a library asks for the old 1.9.24 compiler, don't provide it
                // Kotlin 2.0+ uses the built-in compiler plugin instead
            }
        }
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"